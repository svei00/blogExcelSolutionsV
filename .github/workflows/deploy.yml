name: Deploy Node.js app to AlmaLinux

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy to VPS
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          VPS_IP: ${{ secrets.VPS_IP }}
        run: |
          # Set up SSH for secure connection
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

          # Connect to the VPS and deploy
          ssh -i ~/.ssh/id_ed25519 vefrmeistari@${{ secrets.VPS_IP }} << 'EOF'
            set -e

            # Navigate to the project directory
            cd /var/www/blogExcelSolutionsV

            # Back up the database BEFORE touching any code, so a bad
            # deploy is always recoverable from data that predates it.
            # Reads the connection string straight out of .env (already
            # on the server, dotenv already a root dependency) instead of
            # hardcoding it here. Keeps only the last 5 dumps so this
            # doesn't grow the disk forever.
            BACKUP_DIR=/var/www/blogExcelSolutionsV/backups
            mkdir -p "$BACKUP_DIR"
            MONGO_URI=$(node -e "require('dotenv').config(); console.log(process.env.MongoDB)")
            mongodump --uri="$MONGO_URI" --archive="$BACKUP_DIR/backup_$(date +%Y%m%d_%H%M%S).archive" --gzip
            ls -1t "$BACKUP_DIR"/backup_*.archive | tail -n +6 | xargs -r rm --

            # Force the VPS to exactly match origin/main. A plain `git pull`
            # aborts whenever the working tree is dirty (files edited on the
            # server, or the same change pushed from elsewhere) - which broke
            # deploys before. reset --hard makes the server a pure mirror of
            # the repo: no merge, no dirty-tree aborts. Trade-off: uncommitted
            # edits made directly on the server are discarded, which is correct
            # for a deploy target.
            git fetch origin main
            git reset --hard origin/main

            # Install backend dependencies
            npm install

            # Build the frontend into client/dist. Publishing is a separate
            # step below so a failed build can never blank the live site.
            cd client
            npm install
            NODE_ENV=production npm run build

            # Sanity-check the build before it goes anywhere near the nginx
            # root - an empty or index-less dist/ must abort the deploy
            # rather than get rsynced over a working site.
            test -f dist/index.html || { echo "build produced no index.html, aborting"; exit 1; }

            # Publish. --delete prunes old hashed assets. Trailing slash on
            # the source is load-bearing: it copies dist's *contents*, not
            # the dist directory itself.
            rsync -a --delete dist/ /var/www/excelsolutionsv.com/
            cd ..

            # Start or restart the backend using PM2
            pm2 start /var/www/blogExcelSolutionsV/api/index.js --name mern-blog || pm2 restart mern-blog

            # Health check: confirm the API actually answers post-restart.
            # This does NOT roll back automatically - it fails the Action
            # loudly (instead of a green checkmark on a dead site) so a
            # broken deploy gets noticed immediately, not whenever someone
            # happens to visit the site next.
            sleep 5
            curl -f https://excelsolutionsv.com/api/post/getposts?limit=1 > /dev/null || {
              echo "Health check failed: API did not respond correctly after deploy."
              exit 1
            }
          EOF
